# Dark theme (matches the dark wezterm palette: #011423 bg / #CBE0F0 fg / #47FF9C accent)
set -g status-style "bg=#011423,fg=#CBE0F0"
set -g status-left "#[bg=#47FF9C,fg=#011423,bold] #S #[bg=#011423,fg=#47FF9C,nobold]  "
set -g status-right "#[fg=#627E97] %H:%M  %d %b "
set -g status-left-length 40
set -g status-right-length 60
set -g window-status-style "bg=#011423,fg=#627E97"
set -g window-status-current-style "bg=#47FF9C,fg=#011423,bold"
set -g window-status-format "#[bg=#011423,fg=#627E97] #I #W "
set -g window-status-current-format "#[bg=#47FF9C,fg=#011423,bold] #I #W "
set -g window-status-separator ""
set -g pane-border-style "fg=#214969"
set -g pane-active-border-style "fg=#47FF9C"
set -g message-style "bg=#47FF9C,fg=#011423"
set -g message-command-style "bg=#033259,fg=#CBE0F0"
set -g mode-style "bg=#033259,fg=#CBE0F0"
set -g copy-mode-selection-style "bg=#033259,fg=#CBE0F0"
set -g menu-style "bg=#011423,fg=#CBE0F0"
set -g menu-selected-style "bg=#47FF9C,fg=#011423"
set -g popup-style "bg=#011423,fg=#CBE0F0"
set -g popup-border-style "fg=#214969"
